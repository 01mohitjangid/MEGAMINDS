
services:
  db:
    image: postgres:16-alpine
    container_name: megaminds_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-megaminds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-megaminds}
      POSTGRES_DB: ${POSTGRES_DB:-megaminds}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-megaminds} -d ${POSTGRES_DB:-megaminds}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
